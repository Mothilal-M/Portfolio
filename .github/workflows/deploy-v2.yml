name: Deploy v2 portfolio to GitHub Pages

# Dormant until Phase 6 cutover. At that point:
#  1) GitHub → Settings → Pages → Source: "GitHub Actions".
#  2) Merge redesign/v2 into main (or manually dispatch this workflow).
# Until then, this file ships on the branch but never runs — the current
# main branch still serves mothilal.xyz from repo root as today.

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/deploy-v2.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
